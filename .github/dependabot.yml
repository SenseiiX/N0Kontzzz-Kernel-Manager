version: 2
updates:
  # Update Gradle dependencies (libs.versions.toml, build.gradle(.kts), dll)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "android"
      - "kotlin"
    commit-message:
      prefix: "deps"
      include: "scope"
    rebase-strategy: "auto"
    reviewers:
      - "bimoalfarrabi"  # username GitHub-mu

  # Update GitHub Actions workflows (.github/workflows/)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "gha"
      include: "scope"
    rebase-strategy: "auto"
    reviewers:
      - "bimoalfarrabi"
